<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Pulse — Live Q&amp;A, made human.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F1ECDD"/>
    </linearGradient>
    <radialGradient id="auroraIndigo" cx="0.18" cy="0.2" r="0.55">
      <stop offset="0%" stop-color="#5145E5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5145E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraCoral" cx="0.85" cy="0.85" r="0.55">
      <stop offset="0%" stop-color="#FF6B47" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF6B47" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraEmerald" cx="0.95" cy="0.1" r="0.4">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5145E5"/>
      <stop offset="60%" stop-color="#7A4CE6"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5145E5"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#auroraIndigo)"/>
  <rect width="1200" height="630" fill="url(#auroraCoral)"/>
  <rect width="1200" height="630" fill="url(#auroraEmerald)"/>

  <g transform="translate(80,90)">
    <rect width="80" height="80" rx="20" fill="url(#logoGrad)"/>
    <g fill="none" stroke="#FAFAF7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 44 L26 44 L31 28 L41 60 L51 36 L57 44 L70 44"/>
    </g>
    <text x="100" y="56" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#13131A">Pulse</text>
  </g>

  <text x="80" y="320" font-family="'Bricolage Grotesque', Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="#13131A" letter-spacing="-3">
    Every voice
  </text>
  <text x="80" y="450" font-family="'Bricolage Grotesque', Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="url(#brandGrad)" letter-spacing="-3">
    in the room.
  </text>

  <text x="80" y="540" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#4A4A57">
    Live Q&amp;A for events, classrooms and town halls.
  </text>

  <g transform="translate(80,580)" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="600" fill="#13131A" letter-spacing="3">
    <rect x="-6" y="-22" width="180" height="36" rx="10" fill="#10B981" fill-opacity="0.18"/>
    <circle cx="14" cy="-4" r="6" fill="#10B981"/>
    <text x="32" y="2" fill="#0E7C5C">LIVE NOW</text>
  </g>

  <text x="1120" y="600" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="18" fill="#6B6B7A" letter-spacing="2">pulse.live</text>
</svg>